<!DOCTYPE html>
<html>
<head>
  <title>Result</title>
  <link rel="stylesheet" href="/css/style.css">

  <style>
    .result-container {
      max-width: 1000px;
      margin: 30px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    .question {
      border: 1px solid #ccc;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<div class="result-container">
  <h1>Test Result</h1>

  <h2>
    Score:
    <span id="score"></span> /
    <span id="total"></span>
  </h2>

  <a href="/dashboard">
    <button>Back to Dashboard</button>
  </a>

  <br><br>

  <div id="answers"></div>
</div>

<script>
document.getElementById("score").innerHTML =
  localStorage.getItem("score") || "0";

document.getElementById("total").innerHTML =
  localStorage.getItem("totalQuestions") || "0";

document.getElementById("answers").innerHTML =
  localStorage.getItem("resultHTML") || "No result found.";
</script>

</body>
</html>
