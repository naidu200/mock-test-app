<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="/css/style.css">

  <style>
    .container {
      max-width: 1100px;
    }

    .test-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      margin-top: 25px;
    }

    .history {
      margin-top: 35px;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 10px;
      text-align: center;
    }

    th {
      background: #f4f4f4;
    }

    @media (max-width: 700px) {
      .test-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

<div class="container">

  <h1>Mock Test Dashboard</h1>

  <h3>
    Welcome,
    <span id="username"></span>
  </h3>

  <h2>Select Mock Test</h2>

  <div class="test-grid">
    <button onclick="startTest('Mock Test 1')">Mock Test 1</button>
    <button onclick="startTest('Mock Test 2')">Mock Test 2</button>
    <button onclick="startTest('Mock Test 3')">Mock Test 3</button>
    <button onclick="startTest('Mock Test 4')">Mock Test 4</button>
    <button onclick="startTest('Mock Test 5')">Mock Test 5</button>
    <button onclick="startTest('Mock Test 6')">Mock Test 6</button>
    <button onclick="startTest('Mock Test 7')">Mock Test 7</button>
    <button onclick="startTest('Mock Test 8')">Mock Test 8</button>
    <button onclick="startTest('Mock Test 9')">Mock Test 9</button>
    <button onclick="startTest('Mock Test 10')">Mock Test 10</button>
  </div>

  <br>

  <a href="/admin">
    <button>Admin Panel</button>
  </a>

  <br><br>

  <button onclick="logout()">Logout</button>

  <div class="history">
    <h2>Last 5 Test Attempts</h2>

    <table>
      <thead>
        <tr>
          <th>No</th>
          <th>Test</th>
          <th>Score</th>
          <th>Correct</th>
          <th>Wrong</th>
          <th>Not Answered</th>
          <th>Date</th>
        </tr>
      </thead>

      <tbody id="attemptsTable">
        <tr>
          <td colspan="7">Loading...</td>
        </tr>
      </tbody>
    </table>
  </div>

</div>

<script>
const username = localStorage.getItem("username") || "Student";

document.getElementById("username").innerHTML = username;

function startTest(testName) {
  localStorage.setItem("testName", testName);
  window.location.href = "/test";
}

async function loadAttempts() {
  const response = await fetch(`/attempts/${username}`);
  const attempts = await response.json();

  const table = document.getElementById("attemptsTable");

  if (attempts.length === 0) {
    table.innerHTML = `
      <tr>
        <td colspan="7">No attempts found</td>
      </tr>
    `;
    return;
  }

  table.innerHTML = "";

  attempts.forEach((attempt, index) => {
    table.innerHTML += `
      <tr>
        <td>${index + 1}</td>
        <td>${attempt.testName || "Mock Test"}</td>
        <td>${attempt.score ?? 0}/${attempt.max_marks ?? 0}</td>
        <td>${attempt.correct ?? 0}</td>
        <td>${attempt.wrong ?? 0}</td>
        <td>${attempt.not_answered ?? 0}</td>
        <td>${new Date(attempt.date).toLocaleString()}</td>
      </tr>
    `;
  });
}

function logout() {
  localStorage.clear();
  window.location.href = "/";
}

loadAttempts();
</script>

</body>
</html>
