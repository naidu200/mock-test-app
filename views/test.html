<!DOCTYPE html>
<html>
<head>
  <title>Mock Test</title>
  <link rel="stylesheet" href="/css/style.css">

  <style>
    .test-container {
      max-width: 1000px;
      margin: 30px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    .question {
      border: 1px solid #ccc;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 8px;
    }

    .option {
      padding: 10px;
      margin-top: 8px;
      border: 1px solid #ddd;
      border-radius: 5px;
    }

    #timer {
      color: red;
      font-size: 28px;
      text-align: center;
      font-weight: bold;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

<div class="test-container">
  <h1>Online Mock Test</h1>

  <div id="timer">01:00:00</div>

  <div id="questionsContainer"></div>

  <button onclick="submitTest()">Submit Test</button>
</div>

<script>
let questions = [];
let submitted = false;

async function loadQuestions() {
  const response = await fetch("/api/questions");
  questions = await response.json();

  if (questions.length === 0) {
    document.getElementById("questionsContainer").innerHTML =
      "<h2>No questions found. Upload questions from admin panel.</h2>";
    return;
  }

  displayQuestions();
}

function displayQuestions() {
  const container = document.getElementById("questionsContainer");
  container.innerHTML = "";

  questions.forEach((q, index) => {
    container.innerHTML += `
      <div class="question">
        <h3>${index + 1}. ${q.question}</h3>

        <div class="option">
          <label>
            <input type="radio" name="q${index}" value="${q.option1}">
            ${q.option1}
          </label>
        </div>

        <div class="option">
          <label>
            <input type="radio" name="q${index}" value="${q.option2}">
            ${q.option2}
          </label>
        </div>

        <div class="option">
          <label>
            <input type="radio" name="q${index}" value="${q.option3}">
            ${q.option3}
          </label>
        </div>

        <div class="option">
          <label>
            <input type="radio" name="q${index}" value="${q.option4}">
            ${q.option4}
          </label>
        </div>
      </div>
    `;
  });
}

loadQuestions();

let timeLeft = 3600;

const countdown = setInterval(() => {
  let hours = Math.floor(timeLeft / 3600);
  let minutes = Math.floor((timeLeft % 3600) / 60);
  let seconds = timeLeft % 60;

  document.getElementById("timer").innerHTML =
    `${String(hours).padStart(2, "0")}:` +
    `${String(minutes).padStart(2, "0")}:` +
    `${String(seconds).padStart(2, "0")}`;

  timeLeft--;

  if (timeLeft < 0) {
    clearInterval(countdown);
    submitTest();
  }
}, 1000);

function submitTest() {
  if (submitted) return;
  submitted = true;

  let score = 0;
  let resultHTML = "";

  questions.forEach((q, index) => {
    const selected = document.querySelector(`input[name="q${index}"]:checked`);
    const userAnswer = selected ? selected.value : "Not Answered";
    const correct = userAnswer === q.answer;

    if (correct) {
      score += 1;
    } else if (userAnswer !== "Not Answered") {
      score -= 0.25;
    }

    const options = [q.option1, q.option2, q.option3, q.option4];

    resultHTML += `
      <div class="question">
        <h3>${index + 1}. ${q.question}</h3>
    `;

    options.forEach((option) => {
      let bg = "#f4f4f4";

      if (option === q.answer) {
        bg = "lightgreen";
      }

      if (option === userAnswer && userAnswer !== q.answer) {
        bg = "#ffb3b3";
      }

      resultHTML += `
        <div style="
          padding:10px;
          margin-top:8px;
          border-radius:5px;
          background:${bg};
        ">
          ${option}
        </div>
      `;
    });

    resultHTML += `
        <p><b>Your Answer:</b> ${userAnswer}</p>
        <p><b>Correct Answer:</b> ${q.answer}</p>
        <p><b>Status:</b> ${correct ? "Correct" : "Wrong"}</p>
      </div>
    `;
  });

  const username = localStorage.getItem("username") || "Student";

  localStorage.setItem("score", score);
  localStorage.setItem("totalQuestions", questions.length);
  localStorage.setItem("resultHTML", resultHTML);

  fetch("/save-result", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      username: username,
      score: score,
      total_questions: questions.length
    })
  });

  window.location.href = "/result";
}
</script>

</body>
</html>
