<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Mock Test</title>

<style>

body{
    font-family:Arial;
    background:#f4f4f4;
    padding:20px;
}

.container{
    max-width:1000px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
}

.question{
    border:1px solid #ccc;
    padding:20px;
    margin-bottom:20px;
    border-radius:10px;
}

.option{
    padding:10px;
    margin-top:10px;
    border:1px solid #ddd;
    border-radius:5px;
}

button{
    width:100%;
    padding:15px;
    background:blue;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:18px;
}

#timer{
    font-size:30px;
    color:red;
    text-align:center;
    margin-bottom:20px;
}

</style>

</head>

<body>

<div class="container">

    <h1 align="center">
        Online Mock Test
    </h1>

    <div id="timer">
        01:00:00
    </div>

    <div id="questionsContainer"></div>

    <button onclick="submitTest()">
        Submit Test
    </button>

</div>

<script>

let questions = [];


// LOAD QUESTIONS

async function loadQuestions(){

    try{

        const response =
        await fetch('/api/questions');

        questions =
        await response.json();

        displayQuestions();

    }
    catch(error){

        console.log(error);

    }

}


// DISPLAY QUESTIONS

function displayQuestions(){

    const container =
    document.getElementById(
        "questionsContainer"
    );

    container.innerHTML = "";

    questions.forEach((q,index)=>{

        container.innerHTML += `

        <div class="question">

            <h3>
                ${index+1}.
                ${q.question}
            </h3>

            <div class="option">

                <label>

                    <input
                        type="radio"
                        name="q${index}"
                        value="${q.option1}"
                    >

                    ${q.option1}

                </label>

            </div>

            <div class="option">

                <label>

                    <input
                        type="radio"
                        name="q${index}"
                        value="${q.option2}"
                    >

                    ${q.option2}

                </label>

            </div>

            <div class="option">

                <label>

                    <input
                        type="radio"
                        name="q${index}"
                        value="${q.option3}"
                    >

                    ${q.option3}

                </label>

            </div>

            <div class="option">

                <label>

                    <input
                        type="radio"
                        name="q${index}"
                        value="${q.option4}"
                    >

                    ${q.option4}

                </label>

            </div>

        </div>

        `;

    });

}


loadQuestions();


// TIMER

let timeLeft = 3600;

const timer =
document.getElementById("timer");

const countdown = setInterval(()=>{

    let hours =
    Math.floor(timeLeft / 3600);

    let minutes =
    Math.floor(
        (timeLeft % 3600)/60
    );

    let seconds =
    timeLeft % 60;

    timer.innerHTML =

    `${String(hours).padStart(2,'0')}:`

    +

    `${String(minutes).padStart(2,'0')}:`

    +

    `${String(seconds).padStart(2,'0')}`;

    timeLeft--;

    if(timeLeft < 0){

        clearInterval(countdown);

        submitTest();

    }

},1000);


// SUBMIT TEST

function submitTest(){

    let score = 0;

    let resultHTML = "";

    questions.forEach((q,index)=>{

        const selected =
        document.querySelector(
            `input[name="q${index}"]:checked`
        );

        let userAnswer =
        selected
        ?
        selected.value
        :
        "Not Answered";

        let correct =
        userAnswer === q.answer;


        // SCORE

        if(correct){

            score++;

        }
        else if(
            userAnswer !== "Not Answered"
        ){

            score -= 0.25;

        }


        // RESULT DISPLAY

        resultHTML += `

        <div style="
            border:1px solid #ccc;
            padding:20px;
            margin-bottom:20px;
            border-radius:10px;
        ">

            <h3>
                ${index+1}.
                ${q.question}
            </h3>

            <div style="
                padding:10px;
                margin-top:10px;
                background:
                ${
                    q.option1 === q.answer
                    ?
                    'lightgreen'
                    :
                    q.option1 === userAnswer
                    ?
                    '#ffb3b3'
                    :
                    '#f4f4f4'
                };
            ">

                ${q.option1}

            </div>

            <div style="
                padding:10px;
                margin-top:10px;
                background:
                ${
                    q.option2 === q.answer
                    ?
                    'lightgreen'
                    :
                    q.option2 === userAnswer
                    ?
                    '#ffb3b3'
                    :
                    '#f4f4f4'
                };
            ">

                ${q.option2}

            </div>

            <div style="
                padding:10px;
                margin-top:10px;
                background:
                ${
                    q.option3 === q.answer
                    ?
                    'lightgreen'
                    :
                    q.option3 === userAnswer
                    ?
                    '#ffb3b3'
                    :
                    '#f4f4f4'
                };
            ">

                ${q.option3}

            </div>

            <div style="
                padding:10px;
                margin-top:10px;
                background:
                ${
                    q.option4 === q.answer
                    ?
                    'lightgreen'
                    :
                    q.option4 === userAnswer
                    ?
                    '#ffb3b3'
                    :
                    '#f4f4f4'
                };
            ">

                ${q.option4}

            </div>

            <br>

            <b>
                Your Answer:
            </b>

            ${userAnswer}

            <br><br>

            <b>
                Correct Answer:
            </b>

            ${q.answer}

        </div>

        `;

    });


    localStorage.setItem(
        "score",
        score
    );

    localStorage.setItem(
        "resultHTML",
        resultHTML
    );


    window.location.href =
    '/result';

}

</script>

</body>
</html>
