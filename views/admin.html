<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <link rel="stylesheet" href="/css/style.css">

  <style>
    .container {
      max-width: 1100px;
    }

    .upload-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin-top: 20px;
    }

    .upload-card {
      border: 1px solid #ccc;
      padding: 15px;
      border-radius: 10px;
      background: #fafafa;
    }

    .message {
      color: green;
      text-align: center;
      font-weight: bold;
    }

    @media (max-width: 700px) {
      .upload-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Admin Panel</h1>

  <h2>Add Single Question</h2>

  <form id="questionForm">
    <select id="singleTestName" required>
      <option value="Mock Test 1">Mock Test 1</option>
      <option value="Mock Test 2">Mock Test 2</option>
      <option value="Mock Test 3">Mock Test 3</option>
      <option value="Mock Test 4">Mock Test 4</option>
      <option value="Mock Test 5">Mock Test 5</option>
      <option value="Mock Test 6">Mock Test 6</option>
      <option value="Mock Test 7">Mock Test 7</option>
      <option value="Mock Test 8">Mock Test 8</option>
      <option value="Mock Test 9">Mock Test 9</option>
      <option value="Mock Test 10">Mock Test 10</option>
    </select>

    <input type="text" id="question" placeholder="Question" required>
    <input type="text" id="option1" placeholder="Option 1" required>
    <input type="text" id="option2" placeholder="Option 2" required>
    <input type="text" id="option3" placeholder="Option 3" required>
    <input type="text" id="option4" placeholder="Option 4" required>
    <input type="text" id="answer" placeholder="Correct Answer" required>
    <button type="submit">Add Question</button>
  </form>

  <h3 id="message"></h3>

  <hr>

  <h2>Bulk CSV Upload for Mock Tests</h2>

  <p>
    CSV header must be:
    <b>question,option1,option2,option3,option4,answer</b>
  </p>

  <div class="upload-grid" id="uploadGrid"></div>

</div>

<script>
const uploadGrid = document.getElementById("uploadGrid");

for (let i = 1; i <= 10; i++) {
  uploadGrid.innerHTML += `
    <div class="upload-card">
      <h3>Upload Mock Test ${i}</h3>

      <form class="csvForm" data-test="Mock Test ${i}">
        <input type="file" class="csvFile" accept=".csv" required>
        <button type="submit">Upload Mock Test ${i} CSV</button>
      </form>

      <p class="message" id="msg${i}"></p>
    </div>
  `;
}

document.getElementById("questionForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const data = {
    testName: document.getElementById("singleTestName").value,
    question: document.getElementById("question").value,
    option1: document.getElementById("option1").value,
    option2: document.getElementById("option2").value,
    option3: document.getElementById("option3").value,
    option4: document.getElementById("option4").value,
    answer: document.getElementById("answer").value
  };

  const response = await fetch("/add-question", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  });

  const result = await response.json();

  document.getElementById("message").innerHTML = result.message;
  document.getElementById("questionForm").reset();
});

document.querySelectorAll(".csvForm").forEach((form, index) => {
  form.addEventListener("submit", async function(e) {
    e.preventDefault();

    const testName = form.getAttribute("data-test");
    const fileInput = form.querySelector(".csvFile");

    const formData = new FormData();
    formData.append("testName", testName);
    formData.append("file", fileInput.files[0]);

    const response = await fetch("/upload-csv", {
      method: "POST",
      body: formData
    });

    const result = await response.json();

    document.getElementById(`msg${index + 1}`).innerHTML = result.message;
    form.reset();
  });
});
</script>

</body>
</html>
