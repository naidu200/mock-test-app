<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Panel</title>

<style>

body{
    font-family:Arial;
    background:#f4f4f4;
    padding:20px;
}

.container{
    max-width:800px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
}

h1,h2{
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    margin-top:15px;
    padding:12px;
    width:100%;
    background:blue;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:darkblue;
}

hr{
    margin-top:40px;
    margin-bottom:40px;
}

#message,
#csvMessage{
    color:green;
    margin-top:15px;
    text-align:center;
}

</style>

</head>

<body>

<div class="container">

    <h1>Admin Panel</h1>

    <h2>Add Single Question</h2>

    <form id="questionForm">

        <input
            type="text"
            id="question"
            placeholder="Enter Question"
            required
        >

        <input
            type="text"
            id="option1"
            placeholder="Option 1"
            required
        >

        <input
            type="text"
            id="option2"
            placeholder="Option 2"
            required
        >

        <input
            type="text"
            id="option3"
            placeholder="Option 3"
            required
        >

        <input
            type="text"
            id="option4"
            placeholder="Option 4"
            required
        >

        <input
            type="text"
            id="answer"
            placeholder="Correct Answer"
            required
        >

        <button type="submit">
            Add Question
        </button>

    </form>

    <h3 id="message"></h3>

    <hr>

    <h2>Bulk CSV Upload</h2>

    <form id="csvForm">

        <input
            type="file"
            id="csvFile"
            accept=".csv"
            required
        >

        <button type="submit">
            Upload CSV
        </button>

    </form>

    <h3 id="csvMessage"></h3>

</div>

<script>

// SINGLE QUESTION ADD

document
.getElementById("questionForm")
.addEventListener("submit", async function(e){

    e.preventDefault();

    const data = {

        question:
        document.getElementById("question").value,

        option1:
        document.getElementById("option1").value,

        option2:
        document.getElementById("option2").value,

        option3:
        document.getElementById("option3").value,

        option4:
        document.getElementById("option4").value,

        answer:
        document.getElementById("answer").value

    };

    try{

        const response =
        await fetch('/add-question',{

            method:'POST',

            headers:{
                'Content-Type':'application/json'
            },

            body:JSON.stringify(data)

        });

        const result =
        await response.json();

        document
        .getElementById("message")
        .innerHTML =
        result.message;

        document
        .getElementById("questionForm")
        .reset();

    }
    catch(error){

        console.log(error);

    }

});


// CSV UPLOAD

document
.getElementById("csvForm")
.addEventListener("submit", async function(e){

    e.preventDefault();

    const fileInput =
    document.getElementById("csvFile");

    const formData =
    new FormData();

    formData.append(
        "file",
        fileInput.files[0]
    );

    try{

        const response =
        await fetch('/upload-csv',{

            method:'POST',

            body:formData

        });

        const result =
        await response.json();

        document
        .getElementById("csvMessage")
        .innerHTML =
        result.message;

        document
        .getElementById("csvForm")
        .reset();

    }
    catch(error){

        console.log(error);

    }

});

</script>

</body>
</html>
