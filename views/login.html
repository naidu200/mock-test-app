<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Login</title>

<style>

body{
    font-family:Arial;
    background:#f4f4f4;
}

.container{
    max-width:400px;
    margin:100px auto;
    background:white;
    padding:30px;
    border-radius:10px;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
}

button{
    width:100%;
    padding:12px;
    margin-top:20px;
    background:blue;
    color:white;
    border:none;
}

</style>

</head>

<body>

<div class="container">

    <h1>Login</h1>

    <form id="loginForm">

        <input
            type="email"
            id="email"
            placeholder="Email"
            required
        >

        <input
            type="password"
            id="password"
            placeholder="Password"
            required
        >

        <button type="submit">
            Login
        </button>

    </form>

    <br>

    <a href="/register.html">
        Create Account
    </a>

    <h3 id="message"></h3>

</div>

<script>

document
.getElementById("loginForm")
.addEventListener(
    "submit",
    async function(e){

    e.preventDefault();

    const data = {

        email:
        document.getElementById(
            "email"
        ).value,

        password:
        document.getElementById(
            "password"
        ).value

    };

    const response =
    await fetch('/login',{

        method:'POST',

        headers:{
            'Content-Type':'application/json'
        },

        body:JSON.stringify(data)

    });

    const result =
    await response.json();

    if(result.success){

        localStorage.setItem(
            "username",
            result.username
        );

        window.location.href =
        '/dashboard';

    } else {

        document
        .getElementById("message")
        .innerHTML =
        "Invalid Login";

    }

});

</script>

</body>
</html>
