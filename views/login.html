<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="stylesheet" href="/css/style.css">

    <style>

        body{
            font-family: Arial;
            background:#f4f4f4;
        }

        .container{
            width:350px;
            margin:100px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        input{
            width:100%;
            padding:12px;
            margin-top:10px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:15px;
            background:blue;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:darkblue;
        }

        a{
            text-decoration:none;
        }

        #message{
            margin-top:15px;
            color:red;
            text-align:center;
        }

    </style>

</head>
<body>

<div class="container">

    <h1 align="center">
        Login
    </h1>

    <form id="loginForm">

        <input
            type="email"
            id="email"
            placeholder="Enter Email"
            required
        >

        <input
            type="password"
            id="password"
            placeholder="Enter Password"
            required
        >

        <button type="submit">
            Login
        </button>

    </form>

    <p align="center">

        Don't have account?

        <a href="/register.html">
            Register
        </a>

    </p>

    <h3 id="message"></h3>

</div>

<script>

document
.getElementById("loginForm")
.addEventListener("submit", async function(e){

    e.preventDefault();

    const data = {

        email:
        document.getElementById("email").value,

        password:
        document.getElementById("password").value

    };

    try{

        const response = await fetch('/login',{

            method:'POST',

            headers:{
                'Content-Type':'application/json'
            },

            body:JSON.stringify(data)

        });

        const result = await response.json();

        console.log(result);

        if(result.success){

            localStorage.setItem(
                "username",
                result.username
            );

            window.location.href = "/dashboard";

        } else {

            document
            .getElementById("message")
            .innerHTML = result.message;

        }

    } catch(error){

        console.log(error);

        document
        .getElementById("message")
        .innerHTML = "Login Error";

    }

});

</script>

</body>
</html>
