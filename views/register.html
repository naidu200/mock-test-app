<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Register</title>

<style>

body{
    font-family:Arial;
    background:#f4f4f4;
}

.container{
    max-width:400px;
    margin:100px auto;
    background:white;
    padding:30px;
    border-radius:10px;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
}

button{
    width:100%;
    padding:12px;
    margin-top:20px;
    background:blue;
    color:white;
    border:none;
}

</style>

</head>

<body>

<div class="container">

    <h1>Register</h1>

    <form id="registerForm">

        <input
            type="text"
            id="username"
            placeholder="Username"
            required
        >

        <input
            type="email"
            id="email"
            placeholder="Email"
            required
        >

        <input
            type="password"
            id="password"
            placeholder="Password"
            required
        >

        <button type="submit">
            Register
        </button>

    </form>

    <br>

    <a href="/">
        Already have account? Login
    </a>

    <h3 id="message"></h3>

</div>

<script>

document
.getElementById("registerForm")
.addEventListener(
    "submit",
    async function(e){

    e.preventDefault();

    const data = {

        username:
        document.getElementById(
            "username"
        ).value,

        email:
        document.getElementById(
            "email"
        ).value,

        password:
        document.getElementById(
            "password"
        ).value

    };

    const response =
    await fetch('/register',{

        method:'POST',

        headers:{
            'Content-Type':'application/json'
        },

        body:JSON.stringify(data)

    });

    const result =
    await response.json();

    document
    .getElementById("message")
    .innerHTML =
    result.message;

});

</script>

</body>
</html>
